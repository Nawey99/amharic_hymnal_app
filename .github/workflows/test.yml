# .github/workflows/test.yml
name: Tests and Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.2'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: dart analyze

      - name: Run tests
        run: flutter test

      - name: Install Linux integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            clang \
            cmake \
            libgtk-3-dev \
            libsecret-1-dev \
            libstdc++-12-dev \
            ninja-build \
            pkg-config \
            xvfb

      - name: Run integration tests
        run: xvfb-run --auto-servernum flutter test integration_test/app_test.dart -d linux

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.2'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run linter
        run: flutter analyze

      - name: Check formatting
        run: dart format --set-exit-if-changed .

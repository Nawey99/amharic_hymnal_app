<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ውዳሴ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ውዳሴ</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- sql.js for Drift web support - Must load synchronously before Flutter initializes -->
  <!-- Using local files to avoid CDN/CORS issues -->
  <script>
    // Configure sql.js to use local WASM file
    window.SQL = window.SQL || {};
    window.SQL.config = {
      locateFile: function(filename) {
        // Use local files (must be in web/ directory)
        if (filename.endsWith('.wasm')) {
          return 'sql-wasm.wasm';
        }
        return filename;
      }
    };
  </script>
  <script src="sql-wasm.js"></script>
  
  <!-- Service Worker Registration for sqflite -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sqflite_sw.js')
          .then(function(registration) {
            console.log('ServiceWorker registration successful');
          })
          .catch(function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

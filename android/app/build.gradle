plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.amharic_hymnal_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.amharic_hymnal_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            
            // Enable code shrinking and resource optimization
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    // Split APK by ABI to reduce size
    splits {
        abi {
            enable true
            reset()
            include 'armeabi-v7a', 'arm64-v8a', 'x86_64'
            universalApk true
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "com.google.android.play:core:1.10.3"
}

// Keep Flutter's top-level APK path in sync after Gradle finishes writing APKs.
gradle.buildFinished {
    ["debug", "release"].each { buildType ->
        def gradleApkPath = file("build/outputs/flutter-apk/app-${buildType}.apk")
        def flutterApkPath = file("../../build/app/outputs/flutter-apk/app-${buildType}.apk")
        def gradleBundlePath = file("build/outputs/bundle/${buildType}/app-${buildType}.aab")
        def flutterBundlePath = file("../../build/app/outputs/bundle/${buildType}/app-${buildType}.aab")

        if (gradleApkPath.exists()) {
            flutterApkPath.parentFile.mkdirs()
            if (flutterApkPath.exists()) {
                flutterApkPath.delete()
            }
            copy {
                from gradleApkPath
                into flutterApkPath.parentFile
            }
            println "Copied APK to Flutter expected location: ${flutterApkPath.absolutePath} from ${gradleApkPath.absolutePath}"
        }

        if (gradleBundlePath.exists()) {
            flutterBundlePath.parentFile.mkdirs()
            if (flutterBundlePath.exists()) {
                flutterBundlePath.delete()
            }
            copy {
                from gradleBundlePath
                into flutterBundlePath.parentFile
            }
            println "Copied App Bundle to Flutter expected location: ${flutterBundlePath.absolutePath} from ${gradleBundlePath.absolutePath}"
        }
    }
}

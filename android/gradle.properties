org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
org.gradle.caching=true
org.gradle.parallel=true
# Force Gradle to use Java 17 from Android Studio (fixes JDK 22 jlink.exe error)
org.gradle.java.home=C\:\\Program Files\\Android\\Android Studio\\jbr
# Disable Kotlin incremental compilation to fix cross-drive path issues
kotlin.incremental=false
# Set file encoding to UTF-8 to match Flutter expectations
systemProp.file.encoding=UTF-8
